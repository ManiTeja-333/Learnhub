<!DOCTYPE html>
<html>
<head>
    <title>Login - LearnHub</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>

<div class="main">

    <!-- NAVBAR -->
    <div class="navbar">
        <h2 class="logo">LearnHub</h2>

        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="courses.html">Courses</a></li>
            <li><a href="contact.html">Contact</a></li>
            <li><a href="login.html" class="active">Login</a></li>
        </ul>
    </div>

    <!-- LOGIN FORM -->
    <div class="login-container">

        <div class="login-box">

            <h2 class="login-title">Login Here</h2>

            <!-- FORM START -->
            <form onsubmit="return validateLogin()">

                <input type="email" id="loginEmail" placeholder="Enter Email Here">
                <input type="password" id="loginPassword" placeholder="Enter Password Here">

                <button class="login-btn">Login</button>

            </form>
            <!-- FORM END -->

            <p>
                Don't have an account 
                <a href="signup.html" class="signup-link">Sign up here</a>
            </p>

            <p>Log in with</p>

            <div class="social-icons">
                <ion-icon name="logo-facebook"></ion-icon>
                <ion-icon name="logo-instagram"></ion-icon>
                <ion-icon name="logo-twitter"></ion-icon>
                <ion-icon name="logo-google"></ion-icon>
                <ion-icon name="logo-skype"></ion-icon>
            </div>

        </div>

    </div>
    <footer>

    <div class="footer-container">

        <!-- LEFT -->
        <div class="footer-section">
            <h3>LearnHub</h3>
            <p>Quality education for everyone.</p>
        </div>

        <!-- CENTER -->
        <div class="footer-section">
            <h4>Links</h4>
            <p><a href="index.html">Home</a></p>
            <p><a href="courses.html">Courses</a></p>
            <p><a href="contact.html">Contact</a></p>
        </div>

        <!-- RIGHT -->
        <div class="footer-section">
            <h4>Contact</h4>
            <p>LearnHub, Hyderabad</p>
            <p>info@learnhub.com</p>
            <p>+91 9912346232</p>
        </div>

    </div>

    <div class="footer-bottom">
        © 2026 LearnHub. All rights reserved.
    </div>

</footer>

</div>

<!-- IONICONS -->
<script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons.esm.js"></script>
<script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons.js"></script>

<script src="javascript/script.js"></script>

</body>
</html>
